version: '3.9'

services:
  api_test:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: api_test
    environment:
      NODE_ENV: test
      DB_HOST: postgres_test
      DB_PORT: 5432
      DB_NAME: api_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_ACCESS_SECRET: test_access_secret_min_32_chars_xxxx
      JWT_REFRESH_SECRET: test_refresh_secret_min_32_chars_xxx
    command: npm test
    depends_on:
      postgres_test:
        condition: service_healthy
    networks:
      - test_network

  postgres_test:
    image: postgres:16-alpine
    container_name: postgres_test
    environment:
      POSTGRES_DB: api_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d api_test']
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - test_network

networks:
  test_network:
    driver: bridge
